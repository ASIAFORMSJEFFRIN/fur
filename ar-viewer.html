<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>AR View</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');
    :root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;--border:#2a2a3d;--accent:#6c63ff;--accent2:#ff6584;--accent3:#43e97b;--text:#f0f0ff;--text-dim:#8888aa}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(108,99,255,.18) 0%,transparent 60%);pointer-events:none;z-index:0}
    .wrap{position:relative;z-index:1;flex:1;display:flex;flex-direction:column}

    .topbar{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,10,15,.9);backdrop-filter:blur(12px)}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem}.logo span{color:var(--accent)}
    .badge{background:linear-gradient(135deg,var(--accent3),#00c9a7);color:#000;font-size:.62rem;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase}

    .product-info{padding:16px 18px}
    .pname{font-family:'Syne',sans-serif;font-size:1.35rem;font-weight:800;margin-bottom:3px}
    .pcat{font-size:.76rem;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:11px}
    .dims-row{display:flex;gap:7px;flex-wrap:wrap}
    .dim-badge{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 12px;font-size:.8rem;display:flex;align-items:center;gap:5px}
    .dim-badge .lbl{color:var(--text-dim)}.dim-badge .val{font-weight:600}

    .viewer-wrap{flex:1;padding:0 18px 8px}
    model-viewer{width:100%;height:calc(100vh - 340px);min-height:280px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);--progress-bar-color:var(--accent)}

    .scale-note{margin:5px 18px 0;font-size:.73rem;color:var(--text-dim);text-align:center}
    .scale-note strong{color:var(--accent3)}

    .ar-btn{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 18px 0;padding:16px;background:linear-gradient(135deg,var(--accent),#9b59b6);color:#fff;border:none;border-radius:13px;font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;cursor:pointer;box-shadow:0 8px 28px rgba(108,99,255,.35);transition:all .2s;width:calc(100% - 36px)}
    .ar-btn:active{transform:scale(.97)}
    .ar-btn:disabled{opacity:.4;cursor:not-allowed}

    .steps{margin:12px 18px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px}
    .steps h3{font-family:'Syne',sans-serif;font-size:.78rem;margin-bottom:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
    .step{display:flex;align-items:flex-start;gap:9px;margin-bottom:8px;font-size:.83rem;color:var(--text-dim);line-height:1.45}
    .sdot{width:19px;height:19px;background:linear-gradient(135deg,var(--accent),#9b59b6);border-radius:50%;display:grid;place-items:center;font-size:.63rem;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
    .step strong{color:var(--text)}

    .err-box{background:rgba(255,101,132,.1);border:1px solid rgba(255,101,132,.3);border-radius:10px;padding:13px 16px;margin:0 18px 12px;font-size:.82rem;color:var(--accent2);line-height:1.5;display:none}

    .loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
    .spin{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-screen p{color:var(--text-dim);font-size:.88rem}
  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spin"></div>
  <p id="loadMsg">Loading AR…</p>
</div>

<div class="wrap" id="mainWrap" style="display:none">
  <div class="topbar">
    <div class="logo">AR<span>Furniture</span></div>
    <span class="badge">Live AR</span>
  </div>

  <div class="product-info">
    <div class="pname" id="pname">…</div>
    <div class="pcat"  id="pcat"></div>
    <div class="dims-row">
      <div class="dim-badge"><span class="lbl">W</span><span class="val" id="dw">—</span></div>
      <div class="dim-badge"><span class="lbl">H</span><span class="val" id="dh">—</span></div>
      <div class="dim-badge"><span class="lbl">D</span><span class="val" id="dl">—</span></div>
    </div>
  </div>

  <div class="viewer-wrap">
    <model-viewer id="mv"
      ar ar-modes="webxr scene-viewer quick-look"
      camera-controls auto-rotate
      shadow-intensity="1.2" exposure="1"
      alt="Furniture AR">
      <button slot="ar-button" id="arSlotBtn" style="display:none">AR</button>
    </model-viewer>
  </div>

  <div class="scale-note" id="scaleNote"></div>
  <div class="err-box" id="errBox"></div>

  <button class="ar-btn" id="arBtn" onclick="launchAR()">🥽 View in Your Room (AR)</button>

  <div class="steps">
    <h3>How to use</h3>
    <div class="step"><div class="sdot">1</div><span>Tap <strong>"View in Your Room"</strong> above</span></div>
    <div class="step"><div class="sdot">2</div><span><strong>Allow camera</strong> when browser asks</span></div>
    <div class="step"><div class="sdot">3</div><span>Slowly point phone at the <strong>floor</strong></span></div>
    <div class="step"><div class="sdot">4</div><span><strong>Tap to place</strong> — exact real-world size!</span></div>
  </div>
</div>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<script>
const catIcons={Sofa:'🛋️',Chair:'🪑',Table:'🪵',Bed:'🛏️',Wardrobe:'🚪',Shelf:'📚',Desk:'🖥️',Other:'📦'};

function showErr(msg) {
  const b=document.getElementById('errBox');
  b.style.display='block'; b.innerHTML=msg;
  const btn=document.getElementById('arBtn');
  btn.disabled=true; btn.style.opacity='.35';
}

window.addEventListener('load', async () => {
  const params = new URLSearchParams(window.location.search);
  const name     = params.get('name')     || 'Furniture';
  const category = params.get('category') || '';
  const w        = params.get('w')        || '0';
  const h        = params.get('h')        || '0';
  const l        = params.get('l')        || '0';
  const modelUrl = params.get('modelUrl') || '';

  // Set UI
  document.getElementById('pname').textContent = name;
  document.getElementById('pcat').textContent  = (catIcons[category]||'📦') + ' ' + category;
  document.getElementById('dw').textContent = w + ' cm';
  document.getElementById('dh').textContent = h + ' cm';
  document.getElementById('dl').textContent = l + ' cm';
  document.getElementById('scaleNote').innerHTML = `Exact scale: <strong>${w}×${h}×${l} cm</strong>`;
  document.title = name + ' — AR';

  const mv = document.getElementById('mv');

  if (!modelUrl) {
    document.getElementById('loadMsg').textContent = 'Error loading…';
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainWrap').style.display = 'flex';
    showErr('⚠️ Model URL missing. Please re-scan the QR code.');
    return;
  }

  // Scale: cm → meters
  const wM = (parseFloat(w)/100).toFixed(3);
  const hM = (parseFloat(h)/100).toFixed(3);
  const lM = (parseFloat(l)/100).toFixed(3);

  document.getElementById('loadMsg').textContent = 'Loading 3D model from GitHub…';

  // Set model — try raw GitHub URL, fallback to jsdelivr CDN
  mv.setAttribute('src', modelUrl);
  mv.setAttribute('scale', `${wM} ${hM} ${lM}`);

  mv.addEventListener('error', () => {
    // Try jsdelivr CDN as fallback
    const cdnUrl = modelUrl
      .replace('https://raw.githubusercontent.com/', 'https://cdn.jsdelivr.net/gh/')
      .replace(/\/([^/]+)\/([^/]+)\//, '/$1/$2@main/');
    if (mv.getAttribute('src') !== cdnUrl) {
      document.getElementById('loadMsg').textContent = 'Trying CDN fallback…';
      mv.setAttribute('src', cdnUrl);
    } else {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('mainWrap').style.display = 'flex';
      showErr(`⚠️ Model load failed.<br><br>Check that the GitHub repo is <strong>public</strong> and the file exists at:<br><code style="font-size:.72rem;word-break:break-all">${modelUrl}</code>`);
    }
  });

  mv.addEventListener('load', () => {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainWrap').style.display = 'flex';
  });

  // Fallback timeout
  setTimeout(() => {
    if (document.getElementById('loadingScreen').style.display !== 'none') {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('mainWrap').style.display = 'flex';
    }
  }, 8000);
});

function launchAR() {
  const mv = document.getElementById('mv');
  if (typeof mv.activateAR === 'function') {
    mv.activateAR();
  } else {
    alert('AR requires Android Chrome or iOS Safari on a mobile device. Open this link on your phone!');
  }
}
</script>
</body>
</html>
