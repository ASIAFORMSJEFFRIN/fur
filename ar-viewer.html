<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>AR View</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');
    :root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;--border:#2a2a3d;--accent:#6c63ff;--accent2:#ff6584;--accent3:#43e97b;--text:#f0f0ff;--text-dim:#8888aa}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(108,99,255,.18) 0%,transparent 60%);pointer-events:none;z-index:0}
    .wrap{position:relative;z-index:1;flex:1;display:flex;flex-direction:column}
    .topbar{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,10,15,.9);backdrop-filter:blur(12px)}
    .topbar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem}.topbar-logo span{color:var(--accent)}
    .topbar-badge{background:linear-gradient(135deg,var(--accent3),#00c9a7);color:#000;font-size:.62rem;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase}
    .product-info{padding:18px}
    .product-name{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:3px}
    .product-category{font-size:.78rem;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
    .dims-row{display:flex;gap:7px;flex-wrap:wrap}
    .dim-badge{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 12px;font-size:.8rem;display:flex;align-items:center;gap:5px}
    .dim-badge .label{color:var(--text-dim)}.dim-badge .val{font-weight:600}
    .viewer-section{flex:1;padding:0 18px 8px}
    model-viewer{width:100%;height:320px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);--progress-bar-color:var(--accent)}
    .scale-note{margin:6px 18px 0;font-size:.75rem;color:var(--text-dim);text-align:center}
    .scale-note strong{color:var(--accent3)}
    .ar-launch-btn{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 18px 0;padding:17px;background:linear-gradient(135deg,var(--accent),#9b59b6);color:#fff;border:none;border-radius:13px;font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;cursor:pointer;box-shadow:0 8px 28px rgba(108,99,255,.35);transition:all .2s}
    .ar-launch-btn:active{transform:scale(.97)}
    .instructions{margin:14px 18px 18px;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px}
    .instructions h3{font-family:'Syne',sans-serif;font-size:.82rem;margin-bottom:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
    .steps-list{list-style:none}
    .steps-list li{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px;font-size:.85rem;color:var(--text-dim);line-height:1.5}
    .step-dot{width:20px;height:20px;background:linear-gradient(135deg,var(--accent),#9b59b6);border-radius:50%;display:grid;place-items:center;font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
    .steps-list li span strong{color:var(--text)}
    .error-box{background:rgba(255,101,132,.1);border:1px solid rgba(255,101,132,.3);border-radius:11px;padding:14px;margin:0 18px 14px;font-size:.82rem;color:#ff6584;line-height:1.5;display:none}
    .loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
    .spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-screen p{color:var(--text-dim);font-size:.88rem}
  </style>
</head>
<body>
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p id="loadingMsg">Loading AR experience…</p>
</div>

<div class="wrap" id="mainWrap" style="display:none">
  <div class="topbar">
    <div class="topbar-logo">AR<span>Furniture</span></div>
    <span class="topbar-badge">Live AR</span>
  </div>
  <div class="product-info">
    <div class="product-name" id="dispName">…</div>
    <div class="product-category" id="dispCat"></div>
    <div class="dims-row">
      <div class="dim-badge"><span class="label">W</span><span class="val" id="dispW">—</span></div>
      <div class="dim-badge"><span class="label">H</span><span class="val" id="dispH">—</span></div>
      <div class="dim-badge"><span class="label">D</span><span class="val" id="dispL">—</span></div>
    </div>
  </div>
  <div class="viewer-section">
    <model-viewer id="mv" ar ar-modes="webxr scene-viewer quick-look"
      camera-controls auto-rotate shadow-intensity="1.2" exposure="1"
      alt="Furniture AR">
      <button slot="ar-button" id="arSlotBtn" style="display:none">AR</button>
    </model-viewer>
  </div>
  <div class="scale-note" id="scaleNote"></div>
  <div class="error-box" id="errBox"></div>
  <button class="ar-launch-btn" id="arBtn" onclick="launchAR()">🥽 View in Your Room (AR)</button>
  <div class="instructions">
    <h3>How to use</h3>
    <ul class="steps-list">
      <li><div class="step-dot">1</div><span>Tap <strong>"View in Your Room"</strong> above</span></li>
      <li><div class="step-dot">2</div><span><strong>Allow camera</strong> when prompted</span></li>
      <li><div class="step-dot">3</div><span>Point phone at the <strong>floor</strong> slowly</span></li>
      <li><div class="step-dot">4</div><span><strong>Tap to place</strong> furniture at exact real size</span></li>
    </ul>
  </div>
</div>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<script>
function showError(msg) {
  const b = document.getElementById('errBox');
  b.style.display = 'block';
  b.innerHTML = msg;
  document.getElementById('arBtn').style.opacity = '.4';
  document.getElementById('arBtn').style.pointerEvents = 'none';
}

function setProduct(name, category, w, h, l) {
  const catIcons = {Sofa:'🛋️',Chair:'🪑',Table:'🪵',Bed:'🛏️',Wardrobe:'🚪',Shelf:'📚',Desk:'🖥️',Other:'📦'};
  document.getElementById('dispName').textContent = name || 'Furniture';
  document.getElementById('dispCat').textContent  = (catIcons[category]||'📦') + ' ' + (category||'');
  document.getElementById('dispW').textContent = w + ' cm';
  document.getElementById('dispH').textContent = h + ' cm';
  document.getElementById('dispL').textContent = l + ' cm';
  document.getElementById('scaleNote').innerHTML = `Exact scale: <strong>${w}×${h}×${l} cm</strong>`;
  document.title = (name||'Furniture') + ' — AR';
}

function setModel(dataUrl, w, h, l) {
  const mv = document.getElementById('mv');
  const wM = (parseFloat(w)/100).toFixed(3);
  const hM = (parseFloat(h)/100).toFixed(3);
  const lM = (parseFloat(l)/100).toFixed(3);
  mv.setAttribute('src', dataUrl);
  mv.setAttribute('scale', `${wM} ${hM} ${lM}`);
}

async function loadFromHash(hash) {
  try {
    document.getElementById('loadingMsg').textContent = 'Decoding model…';
    // Decode base64 → JSON
    const json = decodeURIComponent(escape(atob(hash)));
    const data = JSON.parse(json);
    setProduct(data.name, data.category, data.w, data.h, data.l);
    if (data.model) {
      setModel(data.model, data.w, data.h, data.l);
    } else {
      showError('⚠️ Model data missing in QR link.');
    }
  } catch(e) {
    showError('⚠️ Invalid QR link. Please re-generate QR from the app.');
  }
}

async function loadFromParams(params) {
  const id   = params.get('id');
  const name = params.get('name');
  const w    = params.get('w');
  const h    = params.get('h');
  const l    = params.get('l');
  const cat  = params.get('category');
  setProduct(name, cat, w, h, l);

  if (!id) { showError('⚠️ No model data found. Please use QR from the same device.'); return; }

  // Try IndexedDB (same device/browser)
  document.getElementById('loadingMsg').textContent = 'Loading model…';
  try {
    const db = await new Promise((res,rej) => {
      const req = indexedDB.open('arFurniture',1);
      req.onsuccess = e => res(e.target.result);
      req.onerror   = e => rej(e);
    });
    const product = await new Promise((res,rej) => {
      const tx  = db.transaction('products','readonly');
      const req = tx.objectStore('products').get(Number(id));
      req.onsuccess = e => res(e.target.result);
      req.onerror   = e => rej(e);
    });
    if (product?.modelData) {
      setModel(product.modelData, w, h, l);
    } else {
      showError('⚠️ 3D model not found on this device.<br><br>This QR was generated on a different device. Please re-generate the QR from the app on THIS device, or use a small GLB file (&lt;1.5MB) which embeds the model in the QR link.');
    }
  } catch(e) {
    showError('⚠️ Could not load model. Try scanning QR again.');
  }
}

window.addEventListener('load', async () => {
  const hash   = window.location.hash.slice(1);
  const params = new URLSearchParams(window.location.search);

  if (hash) {
    await loadFromHash(hash);
  } else if (params.get('id') || params.get('name')) {
    await loadFromParams(params);
  } else {
    showError('⚠️ No product data found. Scan the QR code again.');
  }

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainWrap').style.display      = 'flex';
});

function launchAR() {
  const mv = document.getElementById('mv');
  if (typeof mv.activateAR === 'function') {
    mv.activateAR();
  } else {
    alert('AR requires Android Chrome or iOS Safari on a mobile device.');
  }
}
</script>
</body>
</html>
